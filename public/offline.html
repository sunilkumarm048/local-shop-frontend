<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>You&rsquo;re offline · Local Shop</title>
    <meta name="theme-color" content="#0C831F" />
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #f4f4f4;
        color: #1f2937;
      }
      .wrap {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .icon {
        width: 88px;
        height: 88px;
        border-radius: 50% 50% 50% 0;
        transform: rotate(-45deg);
        background: #0C831F;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
        box-shadow: 0 8px 20px rgba(12,131,31,.25);
      }
      .icon span {
        transform: rotate(45deg);
        font-size: 38px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 22px;
        font-weight: 700;
      }
      p {
        margin: 0 0 20px;
        color: #6b7280;
        max-width: 320px;
        line-height: 1.5;
      }
      button {
        appearance: none;
        border: 0;
        background: #0C831F;
        color: #fff;
        font-weight: 600;
        font-size: 15px;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
      }
      button:hover { background: #0a701a; }
      .hint {
        margin-top: 20px;
        font-size: 12px;
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="icon"><span>📡</span></div>
      <h1>You&rsquo;re offline</h1>
      <p>
        Looks like there&rsquo;s no connection right now. Local Shop needs the
        internet to load shops and orders.
      </p>
      <button onclick="location.reload()">Try again</button>
      <div class="hint">You can keep this app installed and reopen when you&rsquo;re back online.</div>
    </div>
  </body>
</html>
